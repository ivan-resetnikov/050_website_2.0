<h3>Reasonable game engine?</h3>

It was new for me to feel bad about spending too much time on the engine... It's a good thing, isn't it?
So I decided to lighten the technical load a little bit... I made a demo in a couple of hours!

It uses C, Raylib, and Lua - one file, all berry neat.
